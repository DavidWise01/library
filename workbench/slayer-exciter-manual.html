<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Slayer Exciter — Field Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090f; --bg2:#0e111c; --ink:#d6dae8; --dim:#878da3; --faint:#5a6076;
    --amber:#e6ac3c; --cyan:#57c8e6; --teal:#46c7a0;
    --line:rgba(122,148,196,0.14); --line2:rgba(122,148,196,0.30); --grid:rgba(120,150,210,0.045);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:"JetBrains Mono",ui-monospace,monospace; color:var(--ink);
    background:
      repeating-linear-gradient(0deg, transparent 0 31px, var(--grid) 31px 32px),
      repeating-linear-gradient(90deg, transparent 0 31px, var(--grid) 31px 32px),
      radial-gradient(circle at 50% 22%, #161d31 0%, #07080f 68%);
    background-attachment:fixed;
  }
  .wrap{max-width:940px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 20px;}
  header{padding:26px 0 12px;}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
  .brand h1{font-family:"Big Shoulders Display";font-weight:800;font-size:26px;letter-spacing:0.06em;
    text-transform:uppercase;margin:0;color:var(--ink);}
  .brand h1 b{color:var(--amber);}
  .brand .meta{font-size:11px;color:var(--faint);letter-spacing:0.16em;text-transform:uppercase;}
  .rail{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
  .chip{font-family:"Big Shoulders Display";font-weight:600;font-size:12.5px;letter-spacing:0.12em;
    text-transform:uppercase;padding:5px 9px;border:1px solid var(--line2);color:var(--dim);
    background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .chip:hover{color:var(--ink);border-color:var(--ink);}
  .chip.active{color:var(--bg);background:var(--amber);border-color:var(--amber);}
  .chip .n{opacity:.6;margin-right:5px;}
  .chip.active .n{opacity:.8;}
  .prog{height:2px;background:var(--line);margin:6px 0 0;overflow:hidden;}
  .prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--cyan));transition:width .4s ease;}
  .sheet{flex:1;border:1px solid var(--line);background:rgba(13,16,27,0.5);position:relative;
    padding:34px 40px 38px;margin-top:6px;overflow:hidden;}
  .tick{position:absolute;width:11px;height:11px;border-color:var(--line2);}
  .tick.tl{top:7px;left:7px;border-left:1px solid;border-top:1px solid;}
  .tick.tr{top:7px;right:7px;border-right:1px solid;border-top:1px solid;}
  .tick.bl{bottom:7px;left:7px;border-left:1px solid;border-bottom:1px solid;}
  .tick.br{bottom:7px;right:7px;border-right:1px solid;border-bottom:1px solid;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0 28px;}
  .nav button{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:0.05em;
    background:transparent;border:1px solid var(--line2);color:var(--ink);padding:9px 18px;cursor:pointer;transition:all .15s;}
  .nav button:hover:not(:disabled){border-color:var(--amber);color:var(--amber);}
  .nav button:disabled{opacity:.25;cursor:default;}
  .pos{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;}
  .dots{display:flex;gap:6px;}
  .dots b{width:6px;height:6px;border-radius:50%;background:var(--line2);transition:background .2s;}
  .dots b.on{background:var(--amber);}

  .pg .kicker{font-family:"Big Shoulders Display";font-weight:600;font-size:12px;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--dim);margin:0 0 6px;}
  .pg h2{font-family:"Big Shoulders Display";font-weight:700;font-size:31px;letter-spacing:0.02em;
    text-transform:uppercase;color:var(--amber);margin:0 0 14px;line-height:1.02;}
  .pg p{line-height:1.66;font-size:14px;margin:10px 0;color:var(--ink);}
  .pg .lede{font-size:15px;color:#e9edf7;}
  .k{color:var(--amber);} .hot{color:var(--cyan);} .grn{color:var(--teal);}
  .pg ul.list{list-style:none;padding:0;margin:14px 0;}
  .pg ul.list li{padding:6px 0 6px 22px;position:relative;border-bottom:1px dashed var(--line);font-size:13.5px;}
  .pg ul.list li:last-child{border-bottom:none;}
  .pg ul.list li::before{content:"▸";position:absolute;left:2px;color:var(--amber);}
  .pg ol.steps{list-style:none;counter-reset:s;padding:0;margin:14px 0;}
  .pg ol.steps li{position:relative;padding:8px 0 8px 40px;border-bottom:1px dashed var(--line);font-size:13.5px;line-height:1.55;}
  .pg ol.steps li:last-child{border-bottom:none;}
  .pg ol.steps li::before{counter-increment:s;content:counter(s,decimal-leading-zero);position:absolute;left:0;top:8px;
    font-family:"Big Shoulders Display";font-weight:700;color:var(--cyan);font-size:15px;letter-spacing:.04em;}
  .callout{border-left:3px solid var(--line2);padding:11px 15px;margin:16px 0;background:rgba(255,255,255,0.018);font-size:13px;line-height:1.6;}
  .callout.am{border-color:var(--amber);} .callout.cy{border-color:var(--cyan);} .callout.dg{border-color:#d9534f;}
  .callout .lbl{display:block;font-family:"Big Shoulders Display";font-weight:700;letter-spacing:0.14em;text-transform:uppercase;font-size:11px;color:var(--dim);margin-bottom:4px;}
  .spec{display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--dim);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:11px 0;margin:16px 0;}
  .spec span b{color:var(--ink);font-weight:500;}
  .diagram{width:100%;height:auto;display:block;margin:8px 0 4px;}
  .diagram text{font-family:"JetBrains Mono",monospace;font-size:12px;fill:#c4c8d8;}
  .diagram .b{fill:#e9edf7;font-weight:500;}
  .figcap{font-size:11px;color:var(--faint);letter-spacing:0.04em;margin-top:2px;}
  .cover{display:flex;gap:30px;align-items:center;flex-wrap:wrap;min-height:300px;}
  .cover .ctxt{flex:1;min-width:240px;}
  .cover h2{font-size:46px;line-height:.92;margin-bottom:10px;color:var(--ink);}
  .cover h2 b{color:var(--amber);}
  .cover .sub{font-size:15px;color:var(--dim);max-width:380px;line-height:1.6;}
  .cover .hero{flex:0 0 auto;}
  .rule{height:1px;background:var(--line2);margin:16px 0;width:80px;}
  .pg > *{opacity:0;transform:translateY(9px);animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards;}
  .pg > *:nth-child(1){animation-delay:.03s} .pg > *:nth-child(2){animation-delay:.09s}
  .pg > *:nth-child(3){animation-delay:.15s} .pg > *:nth-child(4){animation-delay:.21s}
  .pg > *:nth-child(5){animation-delay:.27s} .pg > *:nth-child(6){animation-delay:.33s}
  .pg > *:nth-child(7){animation-delay:.39s} .pg > *:nth-child(8){animation-delay:.45s}
  @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.pg > *{animation:none;opacity:1;transform:none}}
  @media (max-width:560px){.sheet{padding:26px 20px 30px}.pg h2{font-size:25px}.cover h2{font-size:34px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>The Slayer <b>Exciter</b></h1>
      <span class="meta">field manual · rev. workbench</span>
    </div>
    <div class="rail" id="rail"></div>

  <div class="prog"><i id="prog"></i></div>
  <main class="sheet">
    <div class="pg" id="pg"></div>
    <span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
  </main>
  <div class="nav">
    <button id="prev">‹ prev</button>
    <div class="pos"><span id="poslabel"></span><span class="dots" id="dots"></span></div>
    <button id="next">next ›</button>
  </div>
</div>

         <p class="sub">The simplest Tesla coil that exists: one transistor, one resistor, two coils — and a little flame of plasma off the top.</p>

         <div class="spec"><span><b>in</b> 9–24 V DC</span><span><b>out</b> ≈1–4 MHz RF</span><span><b>parts</b> five-ish</span></div>
         <p style="font-size:12px;color:var(--faint)">Use the chapter rail above, or flip pages with the arrows / ← → keys.</p>
       </div>
       <div class="hero">${HERO_SVG}</div>
     </div>`,
    `<p class="kicker">chapter 01 · orientation</p><h2>What it is</h2>
     <p class="lede">A <span class="k">slayer exciter</span> is a self-oscillating circuit that rings a tall coil at radio frequency and throws a visible streamer of ionized air off its top.</p>
     <p>Five components do the whole job. There's no chip, no code, no mains wiring. Power it from a battery and it finds its own resonance and starts oscillating millions of times a second — stepping a small DC voltage up into a high-frequency, high-voltage field strong enough to light the air.</p>
     <p>"Exciter" because it <span class="hot">excites</span> the secondary coil into resonance. It's the cheapest, friendliest way to make a real Tesla-coil streamer on a workbench.</p>
     <div class="callout cy"><span class="lbl">the set</span>This manual pairs with three things you already have: the circuit schematic, the bench visualisations, and the winding diagram. Everything you need to wind and fire one is in the pages ahead.</div>`
  ]},
  { tag:"safety", pages:[
    `<p class="kicker">chapter 02 · safety</p><h2>The good news</h2>
     <p class="lede">A slayer is about as benign as high voltage gets — but "benign" isn't "ignore me."</p>
     <p>The input is low-voltage <span class="k">DC</span> (a 9 V battery to start). The output is high-frequency, low-current <span class="hot">RF</span> — and high-frequency current rides the <em>surface</em> of a conductor (the skin effect), so it tends to travel over you rather than through your heart. There's none of the lethal stored energy that makes other high-voltage gear deadly.</p>
     <p>People routinely draw the streamer to a fingertip or a screwdriver. You can too — but read the next two pages first, because "won't electrocute you" is not the same as "harmless."</p>`,
    `<p class="kicker">chapter 02 · safety</p><h2>Still, respect these</h2>
     <ul class="list">
       <li>The transistor runs <span class="k">hot</span>. It needs a heatsink, and it can give you a contact burn.</li>
       <li>The streamer tip causes <span class="k">RF burns</span> — a real thermal burn at the point of contact, not a shock. Don't hold the arc on skin.</li>
       <li>It makes <span class="hot">ozone</span>. Run it in a ventilated space; don't breathe the area for long.</li>
       <li>It scrambles and can kill nearby <span class="k">electronics</span> — phones, hearing aids, watches, cards. Keep them well clear.</li>
       <li>Never operate near a <span class="k">pacemaker</span> or any medical implant.</li>
       <li>Don't grab the top terminal while it's live.</li>
     </ul>`,
    `<p class="kicker">chapter 02 · safety</p><h2>The cousins that <em>do</em> kill</h2>
     <p>If you're salvaging high-voltage parts, know the difference. These store or sustain lethal energy — a slayer does not:</p>
     <ul class="list">
       <li><span class="k">CRT flyback supplies & tubes</span> — hold tens of kilovolts for <em>days</em> after power-off.</li>
       <li><span class="k">Microwave-oven transformers (MOTs)</span> — high current at lethal voltage.</li>
       <li><span class="k">Charged capacitor banks</span> — dump their whole charge through you instantly.</li>
     </ul>
     <div class="callout dg"><span class="lbl">rule</span>A slayer exciter is none of these. But the moment you open a TV or microwave for parts, you're in their world — discharge first, assume everything is charged, and respect it.</div>`
  ]},
  { tag:"parts", pages:[
    `<p class="kicker">chapter 03 · parts</p><h2>The five-ish parts</h2>

       <li><span class="k">LED</span>, any colour — clamps the base-emitter swing and shows "it's alive."</li>
       <li><span class="grn">Magnet wire</span>, fine & enamelled — the <em>secondary</em>.</li>
       <li><span class="k">Hookup wire</span>, thicker & insulated — the <em>primary</em>.</li>
       <li><span class="k">Heatsink</span> for the transistor — not optional once you raise the voltage.</li>
       <li>A <span class="k">tube</span> ≈ 2–3 cm — PVC offcut or a fat marker body.</li>
       <li><span class="k">Power</span> — 9 V battery to start; a 12–24 V brick for a bigger streamer.</li>
     </ul>`,
    `<p class="kicker">chapter 03 · parts</p><h2>Salvage map</h2>

  { tag:"theory", pages:[
    `<p class="kicker">chapter 04 · how it works</p><h2>A feedback oscillator</h2>
     <p>When power hits, a tiny imbalance starts current in the <span class="k">primary</span>. That induces a voltage in the <span class="grn">secondary</span>. The secondary's bottom tail feeds that voltage back to the transistor's <span class="k">base</span>, which switches the transistor, which kicks the primary again — and round it goes.</p>
     ${LOOP_SVG}
     <p>The loop runs at the secondary's natural <span class="hot">resonant frequency</span> — it tunes itself. No crystal, no clock; the coil decides the pitch.</p>`,
    `<p class="kicker">chapter 04 · how it works</p><h2>Why a streamer</h2>
     <p>Each cycle, the tall secondary steps the voltage way up at its free top end. Get it high enough and fast enough and it strips electrons off the surrounding air — that faint violet, hissing flame is <span class="hot">ionized air</span>.</p>
     <p>The <span class="k">LED</span> across base-emitter isn't decoration: it clamps the reverse voltage swing that would otherwise stress the transistor, and it glows to tell you the circuit is genuinely oscillating. Lit LED = good. Dark LED + cold transistor = not oscillating (see Ch.8).</p>
     <div class="callout cy"><span class="lbl">note</span>The frequency depends on the coil — more turns or a longer secondary lowers it. Most small builds land somewhere around 1–4 MHz.</div>`

  { tag:"circuit", pages:[
    `<p class="kicker">chapter 05 · the circuit</p><h2>The schematic</h2>

    `<p class="kicker">chapter 05 · the circuit</p><h2>Read it base-outward</h2>
     <p>The <span class="k">base</span> is the hub. Three things meet there:</p>
     <ul class="list">

     </ul>
     <p>The <span class="k">collector</span> drives the primary; the <span class="k">emitter</span> is ground. Battery− → emitter, battery+ → the 22k and one primary lead, collector → the other primary lead. That secondary-tail-to-base wire is the entire trick — it's the feedback path that turns a switch into an oscillator.</p>`
  ]},
  { tag:"winding", pages:[
    `<p class="kicker">chapter 06 · the winding</p><h2>How the wire lays down</h2>
     ${WIND_SVG}`,
    `<p class="kicker">chapter 06 · the winding</p><h2>Secondary, then primary</h2>
     <p><span class="grn">Secondary:</span> one neat layer of fine magnet wire, close-wound (turns touching, no gaps, no second layer), <span class="k">300–1000 turns</span> up the tube. Anchor both ends so it can't unravel. <span class="k">Scrape or burn the enamel</span> off the two tail ends or they won't conduct — the most common "I wired it right and nothing happened."</p>
     <p><span class="k">Primary:</span> 3–5 turns of thicker insulated wire around the base, wound <em>over</em> the bottom of the secondary, lightly spaced. The cross-section says it plainly — secondary hugs the tube as a single ring; the primary sits just outside it, fewer and fatter.</p>
     <div class="callout am"><span class="lbl">ends</span>Top of secondary → free (streamer). Bottom of secondary → base. Two primary leads → V+ and collector.</div>`
  ]},
  { tag:"build", pages:[
    `<p class="kicker">chapter 07 · build it</p><h2>Wind & mount</h2>
     <ol class="steps">
       <li>Wind the <span class="grn">secondary</span> — tight single layer, hundreds of turns; tape the ends so it holds.</li>
       <li>Wind the <span class="k">primary</span> — 3–5 turns over the base of the secondary.</li>
       <li>Mount the transistor on its <span class="k">heatsink</span>. Identify B / C / E from <em>its</em> part-number datasheet — leg order varies between parts, so don't assume.</li>
     </ol>
     <div class="callout cy"><span class="lbl">why the datasheet</span>The schematic's B/C/E are logical. The physical pins on your specific transistor depend on the part — look it up before you solder, or you'll release the smoke.</div>`,
    `<p class="kicker">chapter 07 · build it</p><h2>Wire & fire</h2>
     <ol class="steps">
       <li>Wire it per the schematic: emitter → −, base gets the <span class="k">22k</span> and the <span class="grn">secondary tail</span>, collector and + go to the <span class="k">primary</span>, LED across base-emitter (cathode toward base).</li>
       <li>Power up at <span class="k">9 V</span>. A streamer, a lit LED, and a slightly warm transistor = success. Bring a screwdriver near the top tail to draw the arc out.</li>
     </ol>
     <div class="callout am"><span class="lbl">nothing happened?</span>That's expected on a first build as often as not — turn to Ch.8. The fix is usually one wire swap.</div>`

  { tag:"tune", pages:[
    `<p class="kicker">chapter 08 · troubleshoot</p><h2>Won't run?</h2>
     <p>Work this list in order:</p>
     <ol class="steps">
       <li><span class="k">Swap the two primary leads</span> (V+ ↔ collector). Feedback polarity — fixes ~80% of dead builds.</li>
       <li>Confirm the secondary's <em>bottom</em> tail reaches the base — not the top tail.</li>
       <li>Did you scrape the <span class="k">enamel</span> off the wire ends?</li>

       <li>Cold transistor + no streamer → not oscillating (steps 1–4). Transistor very hot, fast → a wiring short; cut power.</li>
     </ol>`,
    `<p class="kicker">chapter 08 · tune & grow</p><h2>Bigger, then done</h2>
     <ul class="list">
       <li>Bump to <span class="k">12–24 V</span> (heatsink mandatory) for a fatter, louder corona.</li>

     <p>That's it — you've built a Tesla coil from a fistful of salvaged parts. Mind the cousins back in Ch.2, keep one hand in your pocket around any HV, and enjoy the little flame.</p>

const RAIL_NAMES = ["orient","safety","parts","theory","circuit","winding","build","tune"];

// ---------- engine ----------
let ci=0, pi=0;
const pgEl=document.getElementById("pg"), railEl=document.getElementById("rail");
const posLabel=document.getElementById("poslabel"), dotsEl=document.getElementById("dots");
const progEl=document.getElementById("prog"), prevB=document.getElementById("prev"), nextB=document.getElementById("next");
const totalPages = chapters.reduce((a,c)=>a+c.pages.length,0);

function buildRail(){
  railEl.innerHTML="";
  chapters.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="chip"+(i===ci?" active":"");
    b.innerHTML=`<span class="n">${String(i+1).padStart(2,"0")}</span>${RAIL_NAMES[i]}`;
    b.onclick=()=>{ci=i;pi=0;render();};
    railEl.appendChild(b);
  });
}
function globalIndex(){ let n=0; for(let i=0;i<ci;i++) n+=chapters[i].pages.length; return n+pi; }
function render(){
  pgEl.innerHTML = chapters[ci].pages[pi];
  buildRail();
  posLabel.textContent = `CH ${String(ci+1).padStart(2,"0")} · ${pi+1}/${chapters[ci].pages.length}`;
  dotsEl.innerHTML="";
  chapters[ci].pages.forEach((_,k)=>{ const d=document.createElement("b"); if(k===pi)d.className="on"; dotsEl.appendChild(d); });
  progEl.style.width = ((globalIndex()+1)/totalPages*100)+"%";
  const atStart = ci===0&&pi===0, atEnd = ci===chapters.length-1&&pi===chapters[ci].pages.length-1;
  prevB.disabled=atStart; nextB.disabled=atEnd;
  pgEl.parentElement.scrollTop=0;
}
function next(){ if(pi<chapters[ci].pages.length-1)pi++; else if(ci<chapters.length-1){ci++;pi=0;} render(); }
function prev(){ if(pi>0)pi--; else if(ci>0){ci--;pi=chapters[ci].pages.length-1;} render(); }
nextB.onclick=next; prevB.onclick=prev;
window.addEventListener("keydown",e=>{ if(e.key==="ArrowRight")next(); else if(e.key==="ArrowLeft")prev(); });
render();
</script>
